<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SENTINELLE</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<style>
:root{--bg:#080808;--bg2:#111;--bg3:#181818;--border:#222;--border2:#2e2e2e;--text:#ede9e1;--text2:#888;--text3:#444;--green:#52b788;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden;}
.app{display:flex;height:100vh;}
.sidebar{width:250px;min-width:250px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;}
.s-head{padding:18px 14px;border-bottom:1px solid var(--border);}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.brand-icon{width:30px;height:30px;background:var(--text);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--bg);}
.brand-name{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;}
.brand-sub{font-size:9px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;}
.btn-new{width:100%;padding:8px 12px;background:transparent;border:1px solid var(--border2);border-radius:8px;color:var(--text2);font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .15s;}
.btn-new:hover{background:var(--bg3);color:var(--text);}
.s-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;padding:12px 14px 4px;}
.conv{padding:8px 14px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);border-radius:6px;margin:0 4px;transition:background .1s;}
.conv:hover,.conv.active{background:var(--bg3);color:var(--text);}
.s-bottom{margin-top:auto;border-top:1px solid var(--border);padding:8px;}
.profile{width:100%;padding:10px 12px;background:transparent;border:none;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .1s;}
.profile:hover{background:var(--bg3);}
.p-avatar{width:28px;height:28px;background:var(--text);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:13px;color:var(--bg);flex-shrink:0;}
.p-name{font-size:13px;color:var(--text);font-weight:500;text-align:left;}
.p-role{font-size:11px;color:var(--text3);text-align:left;}
.main{flex:1;display:flex;flex-direction:column;min-width:0;}
.topbar{height:50px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;}
.pill{display:flex;align-items:center;gap:6px;padding:4px 10px;background:var(--bg3);border:1px solid var(--border2);border-radius:20px;font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);}
.dot{width:6px;height:6px;border-radius:50%;background:var(--text3);transition:all .3s;}
.dot.online{background:var(--green);box-shadow:0 0 5px var(--green);}
.dot.thinking{background:#e9c46a;animation:pulse 1s infinite;}
.dot.listening{background:#4cc9f0;animation:pulse .5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.t-actions{margin-left:auto;display:flex;gap:6px;}
.ibtn{width:30px;height:30px;background:transparent;border:none;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);}
.ibtn:hover{background:var(--bg3);color:var(--text);}
.chat{flex:1;overflow-y:auto;padding:28px 0;}
.chat::-webkit-scrollbar{width:3px;}
.chat::-webkit-scrollbar-thumb{background:var(--border2);}
.inner{max-width:700px;margin:0 auto;padding:0 24px;display:flex;flex-direction:column;gap:6px;}
.row{display:flex;gap:10px;padding:3px 0;animation:fi .2s ease;}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.row.user{flex-direction:row-reverse;}
.av{width:26px;height:26px;flex-shrink:0;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:11px;margin-top:2px;}
.row.ai .av{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);}
.row.user .av{background:var(--text);color:var(--bg);}
.body{flex:1;min-width:0;}
.mname{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:3px;}
.row.user .mname{text-align:right;}
.bubble{display:inline-block;max-width:85%;padding:10px 14px;font-size:14px;line-height:1.65;}
.row.ai .bubble{color:var(--text);padding-left:0;}
.row.user .bubble{background:var(--text);color:var(--bg);border-radius:12px 2px 12px 12px;float:right;}
.row.sys{justify-content:center;}
.row.sys .bubble{color:var(--text3);font-family:'DM Mono',monospace;font-size:11px;padding:2px 0;}
.tdots{display:flex;gap:4px;padding:10px 0;}
.td{width:5px;height:5px;border-radius:50%;background:var(--text3);animation:ty .8s infinite;}
.td:nth-child(2){animation-delay:.15s;}.td:nth-child(3){animation-delay:.3s;}
@keyframes ty{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:40px;min-height:300px;}
.welcome h2{font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:4px;}
.welcome p{font-size:14px;color:var(--text2);text-align:center;max-width:380px;line-height:1.6;}
.chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:6px;}
.chip{padding:7px 13px;background:var(--bg3);border:1px solid var(--border2);border-radius:20px;font-size:12px;color:var(--text2);cursor:pointer;font-family:'DM Mono',monospace;transition:all .15s;}
.chip:hover{border-color:#555;color:var(--text);}
.input-area{padding:14px 24px 18px;border-top:1px solid var(--border);}
.input-wrap{max-width:700px;margin:0 auto;background:var(--bg3);border:1px solid var(--border2);border-radius:12px;display:flex;align-items:flex-end;gap:8px;padding:10px 12px;}
.input-wrap:focus-within{border-color:#444;}
#msg{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;resize:none;max-height:120px;line-height:1.5;padding:2px 0;}
#msg::placeholder{color:var(--text3);}
.sbtn{width:30px;height:30px;flex-shrink:0;background:var(--text);border:none;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.sbtn:hover{background:#ccc;}.sbtn:disabled{background:var(--border2);cursor:not-allowed;}
.mbtn{width:30px;height:30px;flex-shrink:0;background:transparent;border:1px solid var(--border2);border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);transition:all .15s;}
.mbtn:hover{color:var(--text);}.mbtn.on{border-color:#4cc9f0;color:#4cc9f0;}
.hint{text-align:center;margin-top:6px;font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:22px;width:340px;}
.modal h3{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:2px;margin-bottom:14px;}
.mrow{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--text2);}
.mrow:last-of-type{border:none;}
.mval{font-family:'DM Mono',monospace;font-size:12px;color:#555;}
.mval.ok{color:var(--green);}
.mclose{margin-top:14px;width:100%;padding:9px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text2);font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;}
.mclose:hover{color:var(--text);}
@media(max-width:600px){.sidebar{display:none;}}
</style>
</head>
<body>
<div class="app">
<aside class="sidebar">
  <div class="s-head">
    <div class="brand">
      <div class="brand-icon">S</div>
      <div><div class="brand-name">SENTINELLE</div><div class="brand-sub">L'Aube Étoilée</div></div>
    </div>
    <button class="btn-new" onclick="nouvelleConv()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Nouvelle conversation
    </button>
  </div>
  <div class="s-label">Récent</div>
  <div class="conv active"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span id="conv-title">Conversation</span></div>
  <div class="s-bottom">
    <button class="profile" onclick="ouvrirParams()">
      <div class="p-avatar">N</div>
      <div><div class="p-name">Nicolas Breidi</div><div class="p-role">Administrateur</div></div>
      <svg style="margin-left:auto;color:var(--text3)" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
  </div>
</aside>
<div class="main">
  <div class="topbar">
    <div class="pill"><div class="dot" id="dot"></div><span id="slabel">Connexion...</span></div>
    <div class="t-actions">
      <button class="ibtn" onclick="effacer()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg></button>
      <button class="ibtn" onclick="ouvrirParams()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg></button>
    </div>
  </div>
  <div class="chat" id="chat"><div class="inner" id="inner"><div class="welcome" id="welcome"><h2>SENTINELLE</h2><p>Votre intelligence artificielle personnelle.</p><div class="chips"><div class="chip" onclick="envoyer2('Parle-moi de L\'Aube Étoilée')">L'Aube Étoilée</div><div class="chip" onclick="envoyer2('Actualités drones autonomes')">Drones</div><div class="chip" onclick="envoyer2('Aide-moi avec Lupi')">Lupi</div><div class="chip" onclick="envoyer2('Mes objectifs du jour')">Objectifs</div></div></div></div></div>
  <div class="input-area">
    <div class="input-wrap">
      <textarea id="msg" rows="1" placeholder="Message à Sentinelle..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();envoyer()}" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
      <button class="mbtn" id="mbtn" onclick="toggleMic()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></button>
      <button class="sbtn" id="sbtn" onclick="envoyer()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
    </div>
    <div class="hint">Entrée envoyer · Maj+Entrée nouvelle ligne · F5 micro</div>
  </div>
</div>
</div>
<div class="overlay" id="overlay">
  <div class="modal">
    <h3>Paramètres</h3>
    <div class="mrow"><span>Modèle</span><span class="mval">phi3:mini</span></div>
    <div class="mrow"><span>Mémoire</span><span class="mval ok" id="pmem">—</span></div>
    <div class="mrow"><span>Statut</span><span class="mval ok">Connecté</span></div>
    <div class="mrow"><span>Version</span><span class="mval">1.0.0</span></div>
    <button class="mclose" onclick="fermerParams()">Fermer</button>
  </div>
</div>
<script>
const socket=io();let mic=false,typing=null,n=0;
socket.on('connect',()=>st('prêt','online'));
socket.on('disconnect',()=>st('déconnecté',''));
socket.on('message',d=>{
  rm();
  if(d.role==='systeme'){const m=d.texte.match(/(\d+) échanges/);if(m)document.getElementById('pmem').textContent=m[1]+' échanges';return;}
  hw();add(d.texte,d.role);
  if(d.role==='sentinelle'){st('prêt','online');dis(false);}
});
socket.on('status',d=>{st(d.texte,d.etat);if(d.etat==='thinking'){ty();dis(true);}else if(d.etat==='online'){rm();dis(false);}});
function st(t,e){document.getElementById('slabel').textContent=t;document.getElementById('dot').className='dot'+(e?' '+e:'');}
function hw(){const w=document.getElementById('welcome');if(w)w.remove();}
function add(txt,role){
  const p=document.getElementById('inner');const r=document.createElement('div');
  const ai=role==='sentinelle',us=role==='nicolas'||role==='user';
  r.className='row '+(ai?'ai':us?'user':'sys');
  if(ai||us)r.innerHTML=`<div class="av">${ai?'S':'N'}</div><div class="body"><div class="mname">${ai?'Sentinelle':'Nicolas'}</div><div class="bubble">${txt.replace(/
/g,'<br>')}</div></div>`;
  else r.innerHTML=`<div class="bubble">${txt}</div>`;
  p.appendChild(r);document.getElementById('chat').scrollTop=99999;n++;
}
function ty(){if(typing)return;const p=document.getElementById('inner');typing=document.createElement('div');typing.className='row ai';typing.innerHTML='<div class="av">S</div><div class="body"><div class="mname">Sentinelle</div><div class="tdots"><div class="td"></div><div class="td"></div><div class="td"></div></div></div>';p.appendChild(typing);document.getElementById('chat').scrollTop=99999;}
function rm(){if(typing){typing.remove();typing=null;}}
function dis(l){document.getElementById('sbtn').disabled=l;}
function envoyer(){const i=document.getElementById('msg');const t=i.value.trim();if(!t)return;hw();add(t,'user');socket.emit('commande',{action:'message',texte:t});i.value='';i.style.height='auto';st('réflexion...','thinking');ty();dis(true);}
function envoyer2(t){hw();add(t,'user');socket.emit('commande',{action:'message',texte:t});st('réflexion...','thinking');ty();dis(true);}
function nouvelleConv(){document.getElementById('inner').innerHTML='<div class="welcome" id="welcome"><h2>SENTINELLE</h2><p>Votre intelligence artificielle personnelle.</p><div class="chips"><div class="chip" onclick="envoyer2(\'L\'Aube Étoilée\')">L'Aube Étoilée</div><div class="chip" onclick="envoyer2(\'Drones autonomes\')">Drones</div></div></div>';document.getElementById('conv-title').textContent='Nouvelle conversation';n=0;}
function effacer(){nouvelleConv();}
function toggleMic(){const b=document.getElementById('mbtn');if(mic){socket.emit('commande',{action:'stop_ecoute'});b.classList.remove('on');mic=false;}else{socket.emit('commande',{action:'ecouter'});b.classList.add('on');st('écoute...','listening');mic=true;setTimeout(()=>{b.classList.remove('on');mic=false;},6000);}}
function ouvrirParams(){document.getElementById('overlay').classList.add('open');}
function fermerParams(){document.getElementById('overlay').classList.remove('open');}
document.addEventListener('keydown',e=>{if(e.key==='F5'){e.preventDefault();toggleMic();}if(e.key==='Escape')fermerParams();});
document.getElementById('overlay').addEventListener('click',e=>{if(e.target===document.getElementById('overlay'))fermerParams();});
socket.emit('commande',{action:'demarrer'});
</script>
</body>
</html>
