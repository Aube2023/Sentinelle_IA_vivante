<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SENTINELLE — L'Aube Étoilée</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<style>
:root {
  --black: #050505;
  --white: #f0ede8;
  --gray-1: #111;
  --gray-2: #1a1a1a;
  --gray-3: #2a2a2a;
  --gray-4: #444;
  --gray-5: #888;
  --accent: #f0ede8;
  --danger: #c0392b;
  --success: #27ae60;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--black);
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
  height: 100vh;
  display: grid;
  grid-template-rows: auto 1fr auto;
  grid-template-columns: 280px 1fr;
  grid-template-areas:
    "sidebar header"
    "sidebar chat"
    "sidebar footer";
  overflow: hidden;
}

/* ── SIDEBAR ── */
aside {
  grid-area: sidebar;
  background: var(--gray-1);
  border-right: 1px solid var(--gray-3);
  display: flex;
  flex-direction: column;
  padding: 0;
  overflow: hidden;
}

.sidebar-logo {
  padding: 28px 24px 20px;
  border-bottom: 1px solid var(--gray-3);
}

.sidebar-logo h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  letter-spacing: 3px;
  color: var(--white);
  line-height: 1;
}

.sidebar-logo p {
  font-size: 10px;
  color: var(--gray-5);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 4px;
}

.status-bar {
  padding: 16px 24px;
  border-bottom: 1px solid var(--gray-3);
  display: flex;
  align-items: center;
  gap: 10px;
}

.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--gray-4);
  flex-shrink: 0;
  transition: background .3s, box-shadow .3s;
}
.status-dot.online { background: var(--success); box-shadow: 0 0 6px var(--success); }
.status-dot.thinking { background: #f39c12; box-shadow: 0 0 6px #f39c12; animation: blink 1s infinite; }
.status-dot.listening { background: #3498db; box-shadow: 0 0 6px #3498db; animation: blink .5s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

#status-label {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--gray-5);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.sidebar-section {
  padding: 16px 24px;
  border-bottom: 1px solid var(--gray-3);
  flex-shrink: 0;
}

.sidebar-section h3 {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--gray-4);
  text-transform: uppercase;
  margin-bottom: 12px;
}

.module-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 0;
}

.module-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.module-dot.ok { background: var(--success); }
.module-dot.off { background: var(--gray-4); }

.module-label {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--gray-5);
}

.pensee-box {
  flex: 1;
  padding: 16px 24px;
  overflow-y: auto;
}

.pensee-box h3 {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--gray-4);
  text-transform: uppercase;
  margin-bottom: 10px;
}

#pensee-texte {
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  color: var(--gray-5);
  font-style: italic;
  line-height: 1.7;
}

.sidebar-actions {
  padding: 16px 24px;
  border-top: 1px solid var(--gray-3);
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* ── HEADER ── */
header {
  grid-area: header;
  padding: 20px 32px;
  border-bottom: 1px solid var(--gray-3);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.header-title {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--gray-5);
  text-transform: uppercase;
}

.header-actions {
  display: flex;
  gap: 8px;
}

/* ── CHAT ── */
#chat {
  grid-area: chat;
  overflow-y: auto;
  padding: 24px 32px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  scroll-behavior: smooth;
}

#chat::-webkit-scrollbar { width: 4px; }
#chat::-webkit-scrollbar-track { background: transparent; }
#chat::-webkit-scrollbar-thumb { background: var(--gray-3); border-radius: 2px; }

.msg-wrapper {
  display: flex;
  gap: 12px;
  animation: fadeUp .3s ease;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

.msg-wrapper.nicolas { flex-direction: row-reverse; }

.msg-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--gray-3);
  border: 1px solid var(--gray-3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px;
  color: var(--gray-5);
  flex-shrink: 0;
}

.msg-wrapper.sentinelle .msg-avatar {
  background: var(--gray-2);
  border-color: var(--gray-4);
  color: var(--white);
}

.msg-content {
  max-width: 65%;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.msg-name {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 1px;
  color: var(--gray-4);
  text-transform: uppercase;
}

.msg-wrapper.nicolas .msg-name { text-align: right; }

.msg-bubble {
  padding: 12px 16px;
  border-radius: 2px;
  font-size: 14px;
  line-height: 1.7;
  font-family: 'DM Sans', sans-serif;
}

.msg-wrapper.nicolas .msg-bubble {
  background: var(--white);
  color: var(--black);
  border-radius: 12px 2px 12px 12px;
}

.msg-wrapper.sentinelle .msg-bubble {
  background: var(--gray-2);
  color: var(--white);
  border: 1px solid var(--gray-3);
  border-radius: 2px 12px 12px 12px;
}

.msg-wrapper.systeme {
  justify-content: center;
}

.msg-wrapper.systeme .msg-bubble {
  background: transparent;
  color: var(--gray-4);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 1px;
  border: none;
  padding: 4px 0;
}

.typing-indicator {
  display: flex;
  gap: 4px;
  padding: 14px 16px;
  background: var(--gray-2);
  border: 1px solid var(--gray-3);
  border-radius: 2px 12px 12px 12px;
  width: fit-content;
}

.typing-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--gray-5);
  animation: typing .8s infinite;
}
.typing-dot:nth-child(2) { animation-delay: .15s; }
.typing-dot:nth-child(3) { animation-delay: .3s; }
@keyframes typing { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

/* ── FOOTER ── */
footer {
  grid-area: footer;
  padding: 16px 32px;
  border-top: 1px solid var(--gray-3);
  display: flex;
  gap: 12px;
  align-items: center;
  background: var(--black);
}

#input-text {
  flex: 1;
  background: var(--gray-1);
  border: 1px solid var(--gray-3);
  border-radius: 8px;
  padding: 12px 18px;
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color .2s;
}

#input-text::placeholder { color: var(--gray-4); }
#input-text:focus { border-color: var(--gray-5); }

/* ── BUTTONS ── */
.btn {
  padding: 10px 18px;
  border: 1px solid var(--gray-3);
  border-radius: 6px;
  background: transparent;
  color: var(--gray-5);
  cursor: pointer;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
  transition: all .2s;
  white-space: nowrap;
}

.btn:hover { border-color: var(--gray-5); color: var(--white); }

.btn-primary {
  background: var(--white);
  color: var(--black);
  border-color: var(--white);
  font-weight: 500;
}
.btn-primary:hover { background: #ddd; border-color: #ddd; color: var(--black); }

.btn-danger { border-color: #3a1a1a; color: #c0392b; }
.btn-danger:hover { background: #1a0a0a; }

.btn-mic {
  width: 44px; height: 44px;
  border-radius: 50%;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

.btn-mic.recording {
  border-color: #3498db;
  color: #3498db;
  animation: blink .5s infinite;
}

.btn-full { width: 100%; justify-content: center; display: flex; }

/* ── SCROLLBAR ── */
.pensee-box::-webkit-scrollbar { width: 3px; }
.pensee-box::-webkit-scrollbar-thumb { background: var(--gray-3); }

/* ── RESPONSIVE ── */
@media (max-width: 700px) {
  body {
    grid-template-columns: 1fr;
    grid-template-rows: auto auto 1fr auto;
    grid-template-areas: "header" "sidebar" "chat" "footer";
  }
  aside { max-height: 180px; overflow-y: auto; }
  .pensee-box { display: none; }
}
</style>
</head>
<body>

<aside>
  <div class="sidebar-logo">
    <h1>SENTINELLE</h1>
    <p>L'Aube Étoilée Technologies</p>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-label">Déconnecté</span>
  </div>

  <div class="sidebar-section">
    <h3>Modules</h3>
    <div class="module-row">
      <div class="module-dot ok"></div>
      <span class="module-label">Cerveau — Mistral 7B</span>
    </div>
    <div class="module-row">
      <div class="module-dot ok" id="mod-voix"></div>
      <span class="module-label">Voix — Whisper + say</span>
    </div>
    <div class="module-row">
      <div class="module-dot ok" id="mod-vision"></div>
      <span class="module-label">Vision — Webcam</span>
    </div>
    <div class="module-row">
      <div class="module-dot ok" id="mod-web"></div>
      <span class="module-label">Recherche — DuckDuckGo</span>
    </div>
    <div class="module-row">
      <div class="module-dot ok" id="mod-conscience"></div>
      <span class="module-label">Conscience — Active</span>
    </div>
  </div>

  <div class="pensee-box">
    <h3>Pensée intérieure</h3>
    <p id="pensee-texte">En attente de réflexion...</p>
  </div>

  <div class="sidebar-actions">
    <button class="btn btn-primary btn-full" onclick="demarrer()">▶ Démarrer</button>
    <button class="btn btn-full" onclick="voirObjectifs()">↗ Objectifs du jour</button>
    <button class="btn btn-danger btn-full" onclick="arreter()">■ Arrêter</button>
  </div>
</aside>

<header>
  <span class="header-title">Conversation — Nicolas Breidi</span>
  <div class="header-actions">
    <button class="btn" onclick="effacerChat()">Effacer</button>
    <button class="btn" id="btn-mic" onclick="toggleMic()">🎤</button>
  </div>
</header>

<div id="chat">
  <div class="msg-wrapper systeme">
    <div class="msg-bubble">Connexion en cours...</div>
  </div>
</div>

<footer>
  <input id="input-text"
    placeholder="Message à Sentinelle... (Entrée pour envoyer)"
    onkeydown="if(event.key==='Enter')envoyer()">
  <button class="btn btn-primary" onclick="envoyer()">Envoyer</button>
</footer>

<script>
const socket = io();
let micActif = false;
let typingEl = null;

// ── Connexion ──
socket.on('connect', () => {
  setStatus('connecté', 'online');
  ajouterMsg('Interface Sentinelle connectée.', 'systeme');
});

socket.on('disconnect', () => {
  setStatus('déconnecté', '');
});

socket.on('message', data => {
  retirerTyping();
  ajouterMsg(data.texte, data.role);
  if(data.role === 'sentinelle') setStatus('prêt', 'online');
});

socket.on('status', data => {
  setStatus(data.texte, data.etat);
  if(data.etat === 'thinking') afficherTyping();
  else retirerTyping();
});

socket.on('pensee', data => {
  document.getElementById('pensee-texte').textContent = data.texte;
});

// ── Fonctions ──
function setStatus(texte, etat) {
  document.getElementById('status-label').textContent = texte;
  const dot = document.getElementById('status-dot');
  dot.className = 'status-dot' + (etat ? ' ' + etat : '');
}

function ajouterMsg(texte, role) {
  const chat = document.getElementById('chat');
  const wrapper = document.createElement('div');
  wrapper.className = 'msg-wrapper ' + role;

  if(role === 'systeme') {
    wrapper.innerHTML = `<div class="msg-bubble">${texte}</div>`;
  } else {
    const initiale = role === 'nicolas' ? 'N' : 'S';
    const nom = role === 'nicolas' ? 'Nicolas' : 'Sentinelle';
    wrapper.innerHTML = `
      <div class="msg-avatar">${initiale}</div>
      <div class="msg-content">
        <span class="msg-name">${nom}</span>
        <div class="msg-bubble">${texte}</div>
      </div>`;
  }

  chat.appendChild(wrapper);
  chat.scrollTop = chat.scrollHeight;
}

function afficherTyping() {
  if(typingEl) return;
  const chat = document.getElementById('chat');
  typingEl = document.createElement('div');
  typingEl.className = 'msg-wrapper sentinelle';
  typingEl.id = 'typing';
  typingEl.innerHTML = `
    <div class="msg-avatar">S</div>
    <div class="msg-content">
      <span class="msg-name">Sentinelle</span>
      <div class="typing-indicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>`;
  chat.appendChild(typingEl);
  chat.scrollTop = chat.scrollHeight;
}

function retirerTyping() {
  if(typingEl) { typingEl.remove(); typingEl = null; }
}

function demarrer() {
  socket.emit('commande', {action: 'demarrer'});
  setStatus('démarrage...', 'thinking');
  afficherTyping();
}

function arreter() {
  socket.emit('commande', {action: 'arreter'});
  setStatus('arrêté', '');
  retirerTyping();
}

function envoyer() {
  const input = document.getElementById('input-text');
  const texte = input.value.trim();
  if(!texte) return;
  ajouterMsg(texte, 'nicolas');
  socket.emit('commande', {action: 'message', texte});
  input.value = '';
  setStatus('réflexion...', 'thinking');
  afficherTyping();
}

function toggleMic() {
  const btn = document.getElementById('btn-mic');
  if(micActif) {
    socket.emit('commande', {action: 'stop_ecoute'});
    btn.classList.remove('recording');
    micActif = false;
  } else {
    socket.emit('commande', {action: 'ecouter'});
    btn.classList.add('recording');
    setStatus('écoute...', 'listening');
    micActif = true;
    setTimeout(() => { btn.classList.remove('recording'); micActif = false; }, 6000);
  }
}

function effacerChat() {
  document.getElementById('chat').innerHTML = '';
}

function voirObjectifs() {
  socket.emit('commande', {action: 'message', texte: "Quels sont mes objectifs du jour ?"});
  setStatus('réflexion...', 'thinking');
  afficherTyping();
}

// Raccourci F5 = micro
document.addEventListener('keydown', e => {
  if(e.key === 'F5') { e.preventDefault(); toggleMic(); }
});
</script>
</body>
</html>
